

services:

  clickhouse:
    image: clickhouse:26.5.1
    container_name: clickhouse
    env_file:
      - ./.env
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse

  postgres:
    image: postgres:17
    container_name: postgres
    env_file:
      - ./.env
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init/clickhouse:/docker-entrypoint-initdb.d
